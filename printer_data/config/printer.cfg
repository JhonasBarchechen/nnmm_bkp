## NASCHEN MADMAX 16/03/2026

#####################################################################
#  Includes
#####################################################################

[include mainsail.cfg]
[include macros.cfg]
[include priming.cfg]

[include klipper-toolchanger/homing_override.cfg]
[include klipper-toolchanger/tc_offset_calibration_macros.cfg]
[include klipper-toolchanger/stealthburner_macros_tc.cfg]
[include klipper-toolchanger/tool_detection.cfg]
[include klipper-toolchanger/toolboard_0.cfg]
[include klipper-toolchanger/toolboard_1.cfg]
[include klipper-toolchanger/toolchanger_macros.cfg]
[include klipper-toolchanger/toolchanger.cfg]

#####################################################################
#  MCU Definitions
#####################################################################

[mcu]
serial = /dev/serial/by-id/usb-Klipper_stm32f446xx_34002A001951303439363932-if00

[mcu toolboard_0]
canbus_uuid = 2a78cc0e2ee7

[mcu toolboard_1]
canbus_uuid = 91fcfc60e00e

#####################################################################
# Printer kinematics
#####################################################################

[printer]
kinematics = corexy
max_velocity = 500
max_accel = 10000
max_z_velocity = 12
max_z_accel = 1000

#####################################################################
#  Printer Configuration
#####################################################################

[shaketune]

[save_variables]
filename: ~/printer_data/config/klipper-toolchanger/offset_save_file.cfg

[force_move]
enable_force_move: true

[exclude_object]

[input_shaper]

[respond]

[idle_timeout]
timeout = 3600

[autotune_tmc stepper_x]
motor = usongshine-17HS8401
tuning_goal: auto

[autotune_tmc stepper_y]
motor = usongshine-17HS8401
tuning_goal: auto

[autotune_tmc stepper_z]
motor = usongshine-17hs4401S
tuning_goal: auto

[autotune_tmc stepper_z1]
motor = usongshine-17hs4401S
tuning_goal: auto

[autotune_tmc stepper_z2]
motor = usongshine-17hs4401S
tuning_goal: auto

#####################################################################
#   X Stepper
#####################################################################

[stepper_x]
step_pin = PE11
dir_pin = PE10
enable_pin = !PE9
rotation_distance = 40
microsteps = 32
full_steps_per_rotation = 200
endstop_pin = ^toolboard_0:PB5
position_min = -2
position_endstop = 185
position_max = 185.5
homing_speed = 40
homing_retract_dist = 5
second_homing_speed = 3
homing_positive_dir = true

[tmc2209 stepper_x]
uart_pin = PE7
run_current = 0.92
sense_resistor = 0.110
stealthchop_threshold = 0
interpolate = true

#####################################################################
#   Y Stepper
#####################################################################

[stepper_y]
step_pin = PD8
dir_pin = !PB12
enable_pin = !PD9
rotation_distance = 40
microsteps = 32
full_steps_per_rotation = 200
endstop_pin = ^PA2
position_min = -14
position_endstop = 180
position_max = 180
homing_speed = 40
homing_retract_dist = 5
second_homing_speed = 3
homing_positive_dir = true

[tmc2209 stepper_y]
uart_pin = PE15
run_current = 0.92
sense_resistor = 0.110
stealthchop_threshold = 0
interpolate = true

#####################################################################
#   Z Steppers
#####################################################################

[stepper_z]
step_pin = PE6
dir_pin = PC13
enable_pin = !PE5
rotation_distance = 8
full_steps_per_rotation = 200
microsteps = 32
endstop_pin = probe:z_virtual_endstop
position_max = 220
position_min = -10
homing_speed = 10
second_homing_speed = 3
homing_retract_dist = 3

[tmc2209 stepper_z]
uart_pin = PC15
interpolate = true
run_current = 0.8
sense_resistor = 0.110
stealthchop_threshold = 0

[stepper_z1]
step_pin = PD12
dir_pin = !PC4
enable_pin = !PE8
rotation_distance = 8
full_steps_per_rotation = 200
microsteps = 32

[tmc2209 stepper_z1]
uart_pin = PA15
uart_address = 0
interpolate = true
run_current = 0.8
sense_resistor = 0.110
stealthchop_threshold = 0

[stepper_z2]
step_pin = PE2
dir_pin = !PE4
enable_pin = !PE3
rotation_distance = 8
full_steps_per_rotation = 200
microsteps = 32

[tmc2209 stepper_z2]
uart_pin = PC14
interpolate = true
run_current = 0.8
sense_resistor = 0.110
stealthchop_threshold = 0

#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
speed = 200
horizontal_move_z = 5
mesh_min = 10, 10
mesh_max = 170, 170
probe_count = 5, 5
algorithm = bicubic

#####################################################################
#   Z_Tilt
#####################################################################

[z_tilt]
horizontal_move_z = 10
retries = 5
retry_tolerance = 0.04
speed = 200
z_positions = 
  -32.5,9
  -32,169
  217,90
points = 
  10,10
  10,168
  173,90

#####################################################################
#  Extruder PID settings, in here so we can save_config
#####################################################################

[extruder]
control: pid
pid_Kp: 34.736
pid_Ki: 4.631
pid_Kd: 65.131

[extruder1]
control: pid
pid_Kp: 33.942
pid_Ki: 3.970
pid_Kd: 72.552

#####################################################################
#   Fan Control
#####################################################################

#[controller_fan mcu_fans]
#pin: PD13
#max_power: 0.5
#cycle_time: 0.016
#kick_start_time: 0.5
#heater: heater_bed

#####################################################################
#   Extra temperature sensors
#####################################################################

[temperature_sensor spider]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 80

[temperature_sensor orange_pi]
sensor_type: temperature_host
gcode_id: D
min_temp: 0
max_temp: 80

[temperature_sensor chamber]
sensor_type = Generic 3950
sensor_pin = PB1
min_temp = 0
max_temp = 80

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin = PB4
sensor_type = Generic 3950
sensor_pin = PB0
max_power = 1
min_temp = 0
max_temp = 120
pwm_cycle_time = 0.017
control = pid
pid_kp = 33.097
pid_ki = 1.481
pid_kd = 184.927

