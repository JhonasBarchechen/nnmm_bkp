# Toolhead 0 - Azul

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: toolboard_0: PD0
dir_pin: toolboard_0: PD1
enable_pin: !toolboard_0: PD2
rotation_distance = 53.494165
gear_ratio = 44:10, 37:17
microsteps = 32
full_steps_per_rotation: 200
nozzle_diameter: 0.40
filament_diameter: 1.75

max_extrude_cross_section: 1.75
max_extrude_only_distance: 100.0

#####################################################################
#   Heater
#####################################################################

heater_pin: toolboard_0: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: toolboard_0: PA3
min_temp: 0
max_temp: 300
max_power: 1.0
smooth_time = 2.0
min_extrude_temp: 170

pressure_advance: 0.04          
pressure_advance_smooth_time: 0.040 

[tmc2209 extruder]
uart_pin = toolboard_0: PA15
interpolate = true
run_current = 0.56

#####################################################################
#   Fan Control
#####################################################################

[fan_generic part_fan_t0]
##  Print Cooling Fan
pin = toolboard_0:PA1
kick_start_time: 0.5
off_below: 0.10

## Hotend fan
[heater_fan extruder_fan]
pin = toolboard_0:PA0
heater = extruder
heater_temp = 50.0
fan_speed = 1.0

#####################################################################
#   Toolhead 0 LEDs
#####################################################################

[neopixel th_leds_t0]
pin = toolboard_0: PD3
chain_count = 3
color_order = GRB
initial_red = 0
initial_green = 0
initial_blue = 1.0

#####################################################################
#   Accelerometer
#####################################################################

[adxl345 toolboard_0]
cs_pin: toolboard_0: PB12
spi_software_sclk_pin: toolboard_0: PB10
spi_software_mosi_pin: toolboard_0: PB11
spi_software_miso_pin: toolboard_0: PB2
axes_map: -x, -z, -y

#####################################################################
#   Temperature Sensor
#####################################################################

[temperature_sensor toolboard_0]
sensor_type: temperature_mcu
sensor_mcu: toolboard_0
min_temp: 0
max_temp: 100

#####################################################################
#   gcode_macro T0
#####################################################################

[gcode_macro T0]
variable_color: ""
variable_tool_number: 0
gcode:
  _CHANGE_TOOL T={tool_number}

[tool T0]
tool_number: 0
extruder: extruder
## Fan control is handled by the tool change macro, not needed here
#fan: fan_generic part_fan_t1
## Offsets are handled by the tool change macro, make sure these are set to 0.
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

## Docking parameters set these for each tool
params_park_x: -2     # X position with the toolhead screws fully within the docking slots.
params_detach_x: 5  # X position with the toolhead screws safely outside of the docking slots.

## Input shaper parameters
params_input_shaper_type_x: 'ei'
params_input_shaper_freq_x: 85.4
params_input_shaper_damping_ratio_x: 0.049
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 50.6
params_input_shaper_damping_ratio_y: 0.066

[tool_probe T0]
pin: toolboard_0:PB5
tool: 0
z_offset: -0.399
speed: 2.0
lift_speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 1.0
samples_tolerance: 0.02
samples_tolerance_retries: 4
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder
